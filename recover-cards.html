<!DOCTYPE html>

<style>
body { font-family: Arial; background: #2a1a4a; color: white; padding: 20px; text-align: center; }

.preview { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; }
.card { background: #f5e6c8; border-radius: 6px; padding: 4px; width: 70px; text-align: center; }
.card svg { width: 60px; height: 60px; }
.card .lbl { color: #333; font-size: 0.7rem; font-weight: bold; }

<p>This will restore all 45 original Numbers and Dots cards to your browser storage.</p>

<button id="restoreBtn">Restore 45 Cards</button>
<button onclick="window.close()" style="background:#666;">Cancel</button>

// Show preview
var prev = document.getElementById('preview');
cards.forEach(function(c) {
    var d = document.createElement('div');
    d.className = 'card';
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 60 60');
    svg.innerHTML = c.svgContent;
    d.appendChild(svg);
    var lbl = document.createElement('div');
    lbl.className = 'lbl';
    lbl.textContent = c.label;
    d.appendChild(lbl);
    prev.appendChild(d);
});

document.getElementById('restoreBtn').onclick = function() {
    try {
        localStorage.setItem('customDrawnCards', JSON.stringify(cards));
        document.getElementById('status').textContent = 'Restored ' + cards.length + ' cards! Now close this tab and reload Studio.';
        document.getElementById('status').style.color = '#4CAF50';
    } catch(e) {
        document.getElementById('status').textContent = 'Error: ' + e.message;
        document.getElementById('status').style.color = '#e74c3c';
    }
};
</script>
